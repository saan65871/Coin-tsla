<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto & Tesla Charts</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111827;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      margin: 0 4px 10px;
      letter-spacing: 0.4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 14px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      box-sizing: border-box;
    }
    .label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #6b7280;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="section-title">비트 / 이더 / 테슬라</div>

  <div class="grid">

    <div class="card">
      <div class="label">Bitcoin</div>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
        {
          "symbols": [
            ["BINANCE:BTCUSDT|1D"]
          ],
          "chartOnly": false,
          "width": "100%",
          "height": 260,
          "locale": "kr",
          "colorTheme": "light",
          "autosize": true,
          "showVolume": false,
          "showMA": false,
          "hideDateRanges": false,
          "hideMarketStatus": false,
          "hideSymbolLogo": false,
          "scalePosition": "right",
          "scaleMode": "Normal",
          "fontFamily": "Arial, sans-serif",
          "fontSize": "10",
          "noTimeScale": false,
          "valuesTracking": "1",
          "changeMode": "price-and-percent",
          "chartType": "area",
          "lineWidth": 2,
          "lineType": 0,
          "dateRanges": ["1D|1","1M|30","3M|60","12M|1D","60M|1W","ALL|1M"]
        }
        </script>
      </div>
    </div>

    <div class="card">
      <div class="label">Ethereum</div>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
        {
          "symbols": [
            ["BINANCE:ETHUSDT|1D"]
          ],
          "chartOnly": false,
          "width": "100%",
          "height": 260,
          "locale": "kr",
          "colorTheme": "light",
          "autosize": true,
          "showVolume": false,
          "showMA": false,
          "hideDateRanges": false,
          "hideMarketStatus": false,
          "hideSymbolLogo": false,
          "scalePosition": "right",
          "scaleMode": "Normal",
          "fontFamily": "Arial, sans-serif",
          "fontSize": "10",
          "noTimeScale": false,
          "valuesTracking": "1",
          "changeMode": "price-and-percent",
          "chartType": "area",
          "lineWidth": 2,
          "lineType": 0,
          "dateRanges": ["1D|1","1M|30","3M|60","12M|1D","60M|1W","ALL|1M"]
        }
        </script>
      </div>
    </div>

    <div class="card">
      <div class="label">Tesla</div>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
        {
          "symbols": [
            ["NASDAQ:TSLA|1D"]
          ],
          "chartOnly": false,
          "width": "100%",
          "height": 260,
          "locale": "kr",
          "colorTheme": "light",
          "autosize": true,
          "showVolume": false,
          "showMA": false,
          "hideDateRanges": false,
          "hideMarketStatus": false,
          "hideSymbolLogo": false,
          "scalePosition": "right",
          "scaleMode": "Normal",
          "fontFamily": "Arial, sans-serif",
          "fontSize": "10",
          "noTimeScale": false,
          "valuesTracking": "1",
          "changeMode": "price-and-percent",
          "chartType": "area",
          "lineWidth": 2,
          "lineType": 0,
          "dateRanges": ["1D|1","1M|30","3M|60","12M|1D","60M|1W","ALL|1M"]
        }
        </script>
      </div>
    </div>

  </div>

</body>
</html>
